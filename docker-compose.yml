services:
  app:
    build: .
    container_name: app
    ports:
      - "3000:3000"
    env_file: ".env"
    environment:
      NODE_ENV: "production"
      DATABASE_URL: "postgres://postgres:supersecret@postgres:5432/postgres"
      WEBSITE_DOMAIN: "http://localhost:3000"
    depends_on:
      - postgres
  postgres:
    image: postgres:18
    container_name: db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: supersecret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql

  adminer:
    image: adminer
    container_name: adminer
    restart: always
    ports:
      - "8888:8080"
    depends_on:
      - postgres

volumes:
  pgdata:
  keycloak_data: